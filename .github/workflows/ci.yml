name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build workspace (release)
        run: cargo build --workspace --release

      - name: Unit tests
        run: cargo test --workspace

      - name: Verify a2g-core has no rusqlite dependency
        run: |
          cargo build -p a2g-core
          if cargo tree -p a2g-core | grep -q rusqlite; then
            echo "FAIL: rusqlite found in a2g-core dependency tree"
            cargo tree -p a2g-core | grep rusqlite
            exit 1
          fi
          echo "OK: rusqlite absent from a2g-core"

      - name: Battle test suite
        run: A2G_BIN=./target/release/a2g bash tests/battle_test.sh

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Formatting
        run: cargo fmt --check

      - name: Install cbindgen
        run: cargo install cbindgen --version "0.27.0" --locked

      - name: Check cbindgen header drift
        run: |
          cbindgen --config crates/a2g-ffi/cbindgen.toml --crate a2g-ffi --verify \
            --output crates/a2g-ffi/include/a2g.h
          echo "OK: a2g.h is up to date"

      - name: Build C smoke test
        run: |
          cargo build -p a2g-ffi --release
          LIB=target/release
          cc -I crates/a2g-ffi/include \
             crates/a2g-ffi/tests/smoke_test.c \
             -L "$LIB" -la2g_ffi \
             -Wl,-rpath,"$LIB" \
             -o smoke_test_bin
          ./smoke_test_bin

      - name: Build and run C integration example
        run: |
          LIB=$(pwd)/target/release
          INC=$(pwd)/crates/a2g-ffi/include
          make -C examples/c_integration \
               A2G_LIB_DIR="$LIB" \
               A2G_INCLUDE="$INC"
          examples/c_integration/a2g_integration

      - name: aarch64 cross-compile check (build only)
        run: |
          rustup target add aarch64-unknown-linux-gnu
          sudo apt-get install -y gcc-aarch64-linux-gnu
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc \
            cargo build -p a2g-ffi --target aarch64-unknown-linux-gnu

      - name: Protocol conformance suite
        run: cargo run -p a2g-conformance

  adversarial:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Adversarial test suite (10 attack vectors)
        run: cargo test -p a2g-gateway --test adversarial -- --nocapture
