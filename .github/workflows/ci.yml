name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build workspace (release)
        run: cargo build --workspace --release

      - name: Unit tests
        run: cargo test --workspace

      - name: Verify a2g-core has no rusqlite dependency
        run: |
          cargo build -p a2g-core
          if cargo tree -p a2g-core | grep -q rusqlite; then
            echo "FAIL: rusqlite found in a2g-core dependency tree"
            cargo tree -p a2g-core | grep rusqlite
            exit 1
          fi
          echo "OK: rusqlite absent from a2g-core"

      - name: Battle test suite
        run: A2G_BIN=./target/release/a2g bash tests/battle_test.sh

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Formatting
        run: cargo fmt --check

      - name: Install cbindgen
        run: cargo install cbindgen --version "0.27.0" --locked

      - name: Check cbindgen header drift
        run: |
          cbindgen --config crates/a2g-ffi/cbindgen.toml --crate a2g-ffi --verify \
            --output crates/a2g-ffi/include/a2g.h
          echo "OK: a2g.h is up to date"

      - name: Build C smoke test
        run: |
          cargo build -p a2g-ffi --release
          LIB=target/release
          cc -I crates/a2g-ffi/include \
             crates/a2g-ffi/tests/smoke_test.c \
             -L "$LIB" -la2g_ffi \
             -Wl,-rpath,"$LIB" \
             -o smoke_test_bin
          ./smoke_test_bin

      - name: Build and run C integration example
        run: |
          LIB=$(pwd)/target/release
          INC=$(pwd)/crates/a2g-ffi/include
          make -C examples/c_integration \
               A2G_LIB_DIR="$LIB" \
               A2G_INCLUDE="$INC"
          examples/c_integration/a2g_integration

      - name: aarch64 cross-compile check (build only)
        run: |
          rustup target add aarch64-unknown-linux-gnu
          sudo apt-get install -y gcc-aarch64-linux-gnu
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc \
            cargo build -p a2g-ffi --target aarch64-unknown-linux-gnu

      - name: Protocol conformance suite
        run: cargo run -p a2g-conformance

  adversarial:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Adversarial test suite (10 attack vectors)
        run: cargo test -p a2g-gateway --test adversarial -- --nocapture

  # ── QNX 8.0 portability check (ADR-0019) ────────────────────────────────────
  #
  # Target: aarch64-unknown-nto-qnx800 (QNX Neutrino 8.0 / AArch64).
  # Rust cfg name: target_os = "nto".
  #
  # Limitation: the QNX SDP 8.0 toolchain (qcc) is commercially licensed and
  # is not available in GitHub Actions runners. This job therefore uses
  # `cargo check` (type-check only, no linking) with the Rust nightly toolchain.
  # `cargo check` does NOT invoke qcc and does NOT validate linker symbols; it
  # confirms that all conditional-compilation gates and type signatures are
  # correct. A full `cargo build` requires the QNX SDP — see
  # docs/qnx-integration.md for instructions.
  #
  # If the Tier 3 target is not installable in the current nightly (this can
  # happen when the target's `std` component is temporarily absent), the job
  # prints a diagnostic and exits 0 without a false green badge. The job is
  # marked `continue-on-error: true` so that a transient rustup availability
  # issue does not block the Linux CI jobs.
  qnx-check:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Attempt to add QNX AArch64 target
        id: add_target
        run: |
          set +e
          rustup target add aarch64-unknown-nto-qnx800 --toolchain nightly 2>&1
          STATUS=$?
          set -e
          if [ $STATUS -ne 0 ]; then
            echo "target_available=false" >> "$GITHUB_OUTPUT"
            echo "WARNING: aarch64-unknown-nto-qnx800 not available in current nightly."
            echo "This is a Tier 3 target; availability depends on nightly build."
            echo "See docs/qnx-integration.md for manual build instructions."
          else
            echo "target_available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: cargo check a2g-core for QNX AArch64
        if: steps.add_target.outputs.target_available == 'true'
        run: |
          cargo +nightly check -p a2g-core \
            --target aarch64-unknown-nto-qnx800 \
            -Z build-std=std,panic_abort \
            --message-format short
          echo "OK: a2g-core cargo check passed for aarch64-unknown-nto-qnx800"

      - name: cargo check a2g-gateway for QNX AArch64 (non-Linux-gated modules)
        if: steps.add_target.outputs.target_available == 'true'
        run: |
          cargo +nightly check -p a2g-gateway \
            --target aarch64-unknown-nto-qnx800 \
            -Z build-std=std,panic_abort \
            --message-format short
          echo "OK: a2g-gateway cargo check passed for aarch64-unknown-nto-qnx800"

      - name: Report QNX check skipped (target unavailable)
        if: steps.add_target.outputs.target_available == 'false'
        run: |
          echo "QNX check skipped: aarch64-unknown-nto-qnx800 not installable from rustup in this run."
          echo "This is expected when the Tier 3 nightly component is temporarily absent."
          echo "Linux CI jobs are unaffected. See docs/qnx-integration.md."

  # ── Android SDK cross-build (ADR-0021) ──────────────────────────────────────
  #
  # Builds the Kotlin Android SDK library and sample module, plus runs host-JVM
  # unit tests (MockJniBridge — no device required).
  #
  # Targets: arm64-v8a (aarch64-linux-android) + x86_64 (x86_64-linux-android).
  #
  # cargo-ndk availability:
  #   If cargo-ndk or the Android NDK is not available, the Gradle task
  #   cargoBuildFfi prints a clear error. The job uses continue-on-error: true
  #   so that NDK toolchain availability on GitHub Actions runners does not
  #   block the main Rust CI jobs. The host-JVM unit tests always run
  #   independently of cargo-ndk.
  android-sdk:
    runs-on: ubuntu-latest
    # No job-level continue-on-error — host-JVM unit tests must pass.
    # NDK-specific steps carry their own continue-on-error because cargo-ndk
    # and the Android NDK may not be available on all runners.

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + Android targets
        uses: dtolnay/rust-toolchain@stable

      - name: Add Android cross-compile targets
        continue-on-error: true
        run: |
          rustup target add aarch64-linux-android x86_64-linux-android

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-ndk
        continue-on-error: true
        run: cargo install cargo-ndk --locked

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK 26
        continue-on-error: true
        run: |
          sdkmanager "ndk;26.3.11579264"

      - name: Generate Gradle wrapper
        working-directory: sdk/android
        run: |
          # Bootstrap the Gradle wrapper using the system Gradle if available,
          # or download and use Gradle directly.
          if command -v gradle &>/dev/null; then
            gradle wrapper --gradle-version 8.7
          else
            # Download Gradle 8.7 directly
            wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /tmp/gradle
            /tmp/gradle/gradle-8.7/bin/gradle wrapper --gradle-version 8.7
          fi

      - name: Build liba2g_ffi.so for Android targets
        continue-on-error: true
        run: |
          cargo ndk -t arm64-v8a -t x86_64 build --release -p a2g-ffi
          echo "arm64-v8a .so size: $(stat -c%s target/aarch64-linux-android/release/liba2g_ffi.so) bytes"
          echo "x86_64 .so size:    $(stat -c%s target/x86_64-linux-android/release/liba2g_ffi.so) bytes"

      - name: Copy .so files to jniLibs
        continue-on-error: true
        run: |
          mkdir -p sdk/android/a2g/src/main/jniLibs/arm64-v8a
          mkdir -p sdk/android/a2g/src/main/jniLibs/x86_64
          cp target/aarch64-linux-android/release/liba2g_ffi.so \
             sdk/android/a2g/src/main/jniLibs/arm64-v8a/liba2g_ffi.so
          cp target/x86_64-linux-android/release/liba2g_ffi.so \
             sdk/android/a2g/src/main/jniLibs/x86_64/liba2g_ffi.so
          echo "OK: jniLibs populated"

      - name: Assemble :a2g library (skip cargo task — .so already copied)
        continue-on-error: true
        working-directory: sdk/android
        run: |
          # Assemble with the pre-copied .so files; skip the cargoBuildFfi task
          # since we ran it manually above to control the copy step.
          ./gradlew :a2g:assembleRelease \
            -x cargoBuildFfi \
            --no-daemon \
            --stacktrace
          echo "OK: :a2g library assembled"

      - name: Assemble :sample application (AAOS demo)
        continue-on-error: true
        working-directory: sdk/android
        run: |
          ./gradlew :sample:assembleDebug \
            -x cargoBuildFfi \
            --no-daemon \
            --stacktrace
          echo "OK: :sample application assembled"

      - name: Run host-JVM unit tests (MockJniBridge — no device required)
        working-directory: sdk/android
        run: |
          ./gradlew :a2g:test \
            --no-daemon \
            --info 2>&1 | tail -50
          echo "OK: host unit tests passed"

      - name: Report test results
        if: always()
        run: |
          echo "=== Test results ==="
          find sdk/android -name "TEST-*.xml" -exec echo {} \; 2>/dev/null || echo "No JUnit XML reports found"
