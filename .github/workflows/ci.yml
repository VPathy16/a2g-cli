name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build workspace (release)
        run: cargo build --workspace --release

      - name: Unit tests
        run: cargo test --workspace

      - name: Verify a2g-core has no rusqlite dependency
        run: |
          cargo build -p a2g-core
          if cargo tree -p a2g-core | grep -q rusqlite; then
            echo "FAIL: rusqlite found in a2g-core dependency tree"
            cargo tree -p a2g-core | grep rusqlite
            exit 1
          fi
          echo "OK: rusqlite absent from a2g-core"

      - name: Battle test suite
        run: A2G_BIN=./target/release/a2g bash tests/battle_test.sh

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Formatting
        run: cargo fmt --check

      - name: Install cbindgen
        run: cargo install cbindgen --version "0.27.0" --locked

      - name: Check cbindgen header drift
        run: |
          cbindgen --config crates/a2g-ffi/cbindgen.toml --crate a2g-ffi --verify \
            --output crates/a2g-ffi/include/a2g.h
          echo "OK: a2g.h is up to date"

      - name: Build C smoke test
        run: |
          cargo build -p a2g-ffi --release
          LIB=target/release
          cc -I crates/a2g-ffi/include \
             crates/a2g-ffi/tests/smoke_test.c \
             -L "$LIB" -la2g_ffi \
             -Wl,-rpath,"$LIB" \
             -o smoke_test_bin
          ./smoke_test_bin

      - name: Build and run C integration example
        run: |
          LIB=$(pwd)/target/release
          INC=$(pwd)/crates/a2g-ffi/include
          make -C examples/c_integration \
               A2G_LIB_DIR="$LIB" \
               A2G_INCLUDE="$INC"
          examples/c_integration/a2g_integration

      - name: aarch64 cross-compile check (build only)
        run: |
          rustup target add aarch64-unknown-linux-gnu
          sudo apt-get install -y gcc-aarch64-linux-gnu
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc \
            cargo build -p a2g-ffi --target aarch64-unknown-linux-gnu

      - name: Protocol conformance suite
        run: cargo run -p a2g-conformance

  adversarial:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Adversarial test suite (10 attack vectors)
        run: cargo test -p a2g-gateway --test adversarial -- --nocapture

  # ── QNX 8.0 portability check (ADR-0019) ────────────────────────────────────
  #
  # Target: aarch64-unknown-nto-qnx800 (QNX Neutrino 8.0 / AArch64).
  # Rust cfg name: target_os = "nto".
  #
  # Limitation: the QNX SDP 8.0 toolchain (qcc) is commercially licensed and
  # is not available in GitHub Actions runners. This job therefore uses
  # `cargo check` (type-check only, no linking) with the Rust nightly toolchain.
  # `cargo check` does NOT invoke qcc and does NOT validate linker symbols; it
  # confirms that all conditional-compilation gates and type signatures are
  # correct. A full `cargo build` requires the QNX SDP — see
  # docs/qnx-integration.md for instructions.
  #
  # If the Tier 3 target is not installable in the current nightly (this can
  # happen when the target's `std` component is temporarily absent), the job
  # prints a diagnostic and exits 0 without a false green badge. The job is
  # marked `continue-on-error: true` so that a transient rustup availability
  # issue does not block the Linux CI jobs.
  qnx-check:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Attempt to add QNX AArch64 target
        id: add_target
        run: |
          set +e
          rustup target add aarch64-unknown-nto-qnx800 --toolchain nightly 2>&1
          STATUS=$?
          set -e
          if [ $STATUS -ne 0 ]; then
            echo "target_available=false" >> "$GITHUB_OUTPUT"
            echo "WARNING: aarch64-unknown-nto-qnx800 not available in current nightly."
            echo "This is a Tier 3 target; availability depends on nightly build."
            echo "See docs/qnx-integration.md for manual build instructions."
          else
            echo "target_available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: cargo check a2g-core for QNX AArch64
        if: steps.add_target.outputs.target_available == 'true'
        run: |
          cargo +nightly check -p a2g-core \
            --target aarch64-unknown-nto-qnx800 \
            -Z build-std=std,panic_abort \
            --message-format short
          echo "OK: a2g-core cargo check passed for aarch64-unknown-nto-qnx800"

      - name: cargo check a2g-gateway for QNX AArch64 (non-Linux-gated modules)
        if: steps.add_target.outputs.target_available == 'true'
        run: |
          cargo +nightly check -p a2g-gateway \
            --target aarch64-unknown-nto-qnx800 \
            -Z build-std=std,panic_abort \
            --message-format short
          echo "OK: a2g-gateway cargo check passed for aarch64-unknown-nto-qnx800"

      - name: Report QNX check skipped (target unavailable)
        if: steps.add_target.outputs.target_available == 'false'
        run: |
          echo "QNX check skipped: aarch64-unknown-nto-qnx800 not installable from rustup in this run."
          echo "This is expected when the Tier 3 nightly component is temporarily absent."
          echo "Linux CI jobs are unaffected. See docs/qnx-integration.md."
