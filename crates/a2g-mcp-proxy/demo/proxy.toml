# A2G MCP Proxy — demo configuration
# ────────────────────────────────────────────────────────────────────────────────
# This config wraps the `a2g-echo-mcp-server` demo downstream and shows how to
# map MCP tool names to A2G capabilities.
#
# NOTE: this file is authoring-side only — it is never signed or included in any
# cryptographic payload.

# ── Downstream MCP server ─────────────────────────────────────────────────────
[downstream]
# The echo server binary must be on $PATH (or provide an absolute path).
command = "a2g-echo-mcp-server"
args = []

# ── A2G mandate path ──────────────────────────────────────────────────────────
# Path to the signed CBOR mandate file.  Generated by `a2g-cli mandate issue`.
# For the quickstart, the setup script writes a test mandate here.
mandate_path = "/tmp/a2g-demo-mandate.cbor"

# ── Gateway socket ────────────────────────────────────────────────────────────
# Unix socket path the gateway is listening on.
# The gateway writes this path when it starts; keep in sync with --socket-path.
gateway_socket = "/tmp/a2g-gateway.sock"

# ── Demo key file ─────────────────────────────────────────────────────────────
# Path to the ephemeral demo keys written by the gateway at startup.
# The proxy reads receipt_signing_key_hex from this file.
# DEMO ONLY — not production key management.
demo_key_file = "/tmp/a2g-gateway-demo-keys.json"

# ── Trust anchor ─────────────────────────────────────────────────────────────
[trust_anchor]
# For the quickstart demo, any self-consistent mandate is accepted.
# In production, use mode = "roots" and list trusted issuer pubkeys.
mode = "self_sovereign"

# ── Tool capability mapping ───────────────────────────────────────────────────
# Maps MCP tool names to A2G capability names.
#
# ANY TOOL NOT LISTED HERE is treated as "pay.unknown" (always-HITL, fail-closed).
# This is the default rule per ADR-0019.
#
# Capability names may be:
#   - VHAL names:      vehicle.climate.set_temperature, vehicle.window.open, ...
#   - Cockpit domains: comms.call.place, pay.checkout, pii.contacts.read, ...
#   - Any custom name in the mandate's capabilities.tools list.
[tool_map]
# The demo echo server exposes one tool: "echo".
# Map it to a Comfort-domain VHAL capability so it passes governance.
echo = "vehicle.climate.set_temperature"

# Example mappings (commented out — add to your mandate to enable):
# read_file       = "vehicle.infotainment.media_control"
# send_message    = "comms.sms.send"         # always-HITL
# make_call       = "comms.call.place"       # always-HITL
# checkout        = "pay.checkout"           # always-HITL
# read_contacts   = "comms.contacts.read"    # requires pii.grant sentinel
