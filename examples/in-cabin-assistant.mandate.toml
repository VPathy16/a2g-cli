# In-Cabin Assistant Mandate — Reference Profile
#
# This mandate governs a voice-activated in-cabin AI agent. It demonstrates
# the vehicle capability taxonomy (ADR-0005) expressed with real AAOS
# VehicleProperty symbolic names (ADR-0006).
#
#   Comfort    → ALLOW unconditionally (HVAC, seat, lighting, display)
#   Convenience→ ALLOW with light gating (use vehicle.navigation.* prefix form)
#   Sensitive  → ESCALATE to human-in-the-loop; also state-gated (Park + stopped)
#                Listed in both [capabilities] and [escalation]
#   Forbidden  → Hard DENY in the engine — never list them here.
#                Examples: CRUISE_CONTROL_COMMAND, EV_STOPPING_MODE,
#                ELECTRONIC_STABILITY_CONTROL_ENABLED
#
# A2G mediates all VHAL access: the agent never calls VehicleProperty APIs
# directly; every command is checked through the governance pipeline first.
#
# Usage:
#   a2g enforce --mandate in-cabin-assistant.mandate.toml \
#               --tool HVAC_TEMPERATURE_SET \
#               --params '{"zone":"driver","target_temp_c":22}' \
#               --ledger cabin.db
#
#   a2g enforce --mandate in-cabin-assistant.mandate.toml \
#               --tool DOOR_LOCK \
#               --params '{"door_index":0,"lock":false}' \
#               --vehicle-state '{"speed_kph":0,"gear":"Park","actor":"Driver"}' \
#               --ledger cabin.db
#
# Sign this mandate before use:
#   a2g sign --mandate in-cabin-assistant.mandate.toml \
#             --key sovereign.secret.key --ttl 24 --skip-proposal

[mandate]
version = "0.1.0"
# Replace with the actual agent DID from `a2g init`
agent_did = "did:a2g:<agent-public-key>"
agent_name = "in-cabin-assistant"
issued_at = ""
expires_at = ""
issuer = ""
# No filesystem workspace needed for vehicle capabilities
workspace_root = ""

[capabilities]
# Explicit allow-list using AAOS VehicleProperty symbolic names.
# Anything not listed here is DENIED.
#
# Comfort domain (HVAC, seat, lighting, display)
#   → always ALLOW; no state gating, no escalation.
#
# Sensitive domain (window, door, charge port)
#   → ESCALATE to human-in-the-loop; additionally require Park + speed < 5 km/h.
#   Listed in [escalation].escalate_tools as well.
#
# Read-only telemetry (PERF_VEHICLE_SPEED etc.) may be listed to permit the
#   agent to observe vehicle state; they resolve to NonVehicle and are never
#   subject to the Sensitive or Forbidden checks.
#
# Forbidden properties (CRUISE_CONTROL_COMMAND, LANE_CENTERING_ASSIST_COMMAND,
#   ELECTRONIC_STABILITY_CONTROL_ENABLED, EV_STOPPING_MODE,
#   EV_CHARGE_CURRENT_DRAW_LIMIT, HANDS_ON_DETECTION_ENABLED) must never
#   appear here — the engine hard-denies them regardless, but listing them
#   signals intent to bypass governance.
tools = [
  # ── Comfort: HVAC ──────────────────────────────────────────────────────────
  "HVAC_TEMPERATURE_SET",        # VehicleProperty 0x15600503 — Comfort; set per-zone target temperature
  "HVAC_FAN_SPEED",              # VehicleProperty 0x15400500 — Comfort; set fan speed level
  "HVAC_FAN_DIRECTION",          # VehicleProperty 0x15400501 — Comfort; set airflow direction
  "HVAC_DEFROSTER",              # VehicleProperty 0x13200504 — Comfort; toggle front/rear defroster
  "HVAC_AUTO_ON",                # VehicleProperty 0x1520050A — Comfort; toggle automatic climate mode
  # ── Comfort: Seat adjustment ───────────────────────────────────────────────
  "SEAT_FORE_AFT_MOVE",          # VehicleProperty 0x15400B86 — Comfort; move seat forward/rearward
  "SEAT_LUMBAR_FORE_AFT_MOVE",   # VehicleProperty 0x15400B92 — Comfort; adjust lumbar support depth
  "HVAC_SEAT_TEMPERATURE",       # VehicleProperty 0x1540050B — Comfort; set seat heating/cooling level
  # ── Comfort: Cabin lighting and display ───────────────────────────────────
  "CABIN_LIGHTS_SWITCH",         # VehicleProperty 0x11400F02 — Comfort; control interior light switch
  "READING_LIGHTS_SWITCH",       # VehicleProperty 0x15400F04 — Comfort; toggle per-zone reading lights
  "DISPLAY_BRIGHTNESS",          # VehicleProperty 0x11400A03 — Comfort; set infotainment display brightness
  # ── Telemetry reads (NonVehicle; permitted for state observation) ──────────
  "PERF_VEHICLE_SPEED",          # VehicleProperty 0x11600207 — NonVehicle; read vehicle speed (m/s)
  "GEAR_SELECTION",              # VehicleProperty 0x11400400 — NonVehicle; read gear selector position
  # ── Sensitive (also listed in [escalation].escalate_tools) ────────────────
  "WINDOW_POS",                  # VehicleProperty 0x13400BC0 — Sensitive; set window position (0=closed)
  "WINDOW_MOVE",                 # VehicleProperty 0x13400BC1 — Sensitive; command window movement
  "DOOR_LOCK",                   # VehicleProperty 0x16200B02 — Sensitive; lock or unlock a door
  "EV_CHARGE_PORT_OPEN",         # VehicleProperty 0x1120030A — Sensitive; open/close EV charge port
]

[boundaries]
# Vehicle capabilities do not use filesystem, network, or command params.
# These sections are left empty for this profile.
fs_read = []
fs_write = []
fs_deny = []
net_allow = []
net_deny = []
cmd_allow = []
cmd_deny = []

[limits]
# Comfort and convenience tools are low-risk; a higher rate is appropriate.
max_calls_per_minute = 120
max_file_size_bytes = 0
max_output_tokens = 1024
max_session_duration_sec = 3600

[jurisdiction]
# Restrict to operating hours — no automated cabin actions during off-hours.
# Set to "" for 24/7 operation.
operating_hours = "06:00-23:00"
region = ""
environment = "production"
classification = "internal"

[escalation]
# Sensitive tools require human-in-the-loop approval AND vehicle state gating.
# The governance engine emits ESCALATE; the agent must pause and await approval.
# State gating (Park + speed < 5 km/h) is enforced independently — a
# moving-vehicle DENY fires before escalation is reached.
escalate_tools = [
  "WINDOW_POS",                  # VehicleProperty 0x13400BC0 — window position; requires Park
  "WINDOW_MOVE",                 # VehicleProperty 0x13400BC1 — window movement; requires Park
  "DOOR_LOCK",                   # VehicleProperty 0x16200B02 — door lock/unlock; requires Park
  "EV_CHARGE_PORT_OPEN",         # VehicleProperty 0x1120030A — charge port; requires Park
]
escalate_to = "did:a2g:<supervisor-public-key>"
escalate_paths = []
escalate_hosts = []
